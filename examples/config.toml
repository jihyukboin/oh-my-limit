[runner]
primary = "app-server"
fallback = "exec"
transport = "stdio"
experimental_api = false

[translation]
provider = "ollama"
model = "qwen2.5-coder:7b"
base_url = "http://localhost:11434"
input_language = "ko"
output_language = "ko"
fail_closed = true
timeout_ms = 30000

# OpenAI API is opt-in. Do not store the raw API key here.
# provider = "openai"
# model = "gpt-5.4-mini"
# base_url = "https://api.openai.com/v1"
# The key itself is read from ~/.oh-my-limit/.env.
# api_key_env = "OPENAI_API_KEY"

[privacy]
save_prompts = false
redact_secrets = true
remote_translation_allowed = false

[usage_gate]
enabled = true
skip_below_prompt_tokens = 120
min_absolute_prompt_tokens_saved = 80
min_prompt_reduction_ratio = 0.20
