name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: Build release binary
        run: cargo +1.95.0 build --workspace --release

